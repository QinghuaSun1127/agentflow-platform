# 在仓库根目录执行: docker compose up -d
# 需先在 Docker Desktop 中为当前 WSL 发行版开启 WSL integration

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: agentflow-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres-vector:5432/agentflow_db
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOW_ORIGINS: http://localhost:8501,http://127.0.0.1:8501
    ports:
      - "8000:8000"
    depends_on:
      postgres-vector:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles: ["app"]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agentflow-frontend
    environment:
      AGENTFLOW_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    profiles: ["app"]
    restart: unless-stopped

  # 长期记忆与 RAG 向量数据库
  postgres-vector:
    image: ankane/pgvector:v0.5.1
    container_name: agentflow-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agentflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agentflow_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # 短期记忆与分布式锁缓存
  redis:
    image: redis:7-alpine
    container_name: agentflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
