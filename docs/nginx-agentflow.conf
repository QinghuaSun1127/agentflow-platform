# Replace agentflow.example.com / api.agentflow.example.com with your domains.
# Agent listens on 127.0.0.1 only when using compose.prod.yaml port bindings.
# Access / error logs: rotate with logrotate (see docs/deployment.md).

gzip on;
gzip_types text/plain text/css application/json application/javascript;

server {
    listen 80;
    server_name agentflow.example.com;
    access_log /var/log/nginx/agentflow-app.access.log;
    error_log /var/log/nginx/agentflow-app.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name api.agentflow.example.com;
    access_log /var/log/nginx/agentflow-api.access.log;
    error_log /var/log/nginx/agentflow-api.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
