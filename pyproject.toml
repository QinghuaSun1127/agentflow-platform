[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = ["venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ARG", "SIM"]
ignore = [
    "B008",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ARG001"]
